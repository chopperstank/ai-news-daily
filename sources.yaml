# 数据源配置
# type: rss | api | crawler
# category: 分类标签
# enabled: 是否启用

sources:
  # ===== AI / 机器学习 =====
  - name: "Hacker News"
    type: api
    url: "https://hacker-news.firebaseio.com/v0"
    category: "人工智能"
    enabled: true
    priority: 1

  - name: "36Kr AI"
    type: rss
    url: "https://36kr.com/feed"
    category: "人工智能"
    enabled: true
    priority: 1

  - name: "InfoQ AI"
    type: rss
    url: "https://www.infoq.cn/feed"
    category: "人工智能"
    enabled: true
    priority: 2

  # ===== 开发者工具 =====
  - name: "GitHub Trending"
    type: crawler
    url: "https://github.com/trending"
    category: "开发工具"
    enabled: true
    priority: 1

  - name: "Dev.to"
    type: rss
    url: "https://dev.to/feed"
    category: "开发工具"
    enabled: true
    priority: 2

  - name: "Hashnode"
    type: rss
    url: "https://hashnode.com/rss.xml"
    category: "开发工具"
    enabled: true
    priority: 2

  # ===== 科技媒体 =====
  - name: "TechCrunch"
    type: rss
    url: "https://techcrunch.com/feed/"
    category: "科技"
    enabled: true
    priority: 1

  - name: "The Verge"
    type: rss
    url: "https://www.theverge.com/rss/index.xml"
    category: "科技"
    enabled: true
    priority: 1

  - name: "Ars Technica"
    type: rss
    url: "https://feeds.arstechnica.com/arstechnica/index"
    category: "科技"
    enabled: true
    priority: 2

  # ===== 开源 =====
  - name: "GitHub Blog"
    type: rss
    url: "https://github.blog/feed/"
    category: "开源"
    enabled: true
    priority: 2

  - name: "Open Source Blog"
    type: rss
    url: "https://opensource.guide/feed.xml"
    category: "开源"
    enabled: true
    priority: 2

  # ===== 云计算 =====
  - name: "AWS Blog"
    type: rss
    url: "https://aws.amazon.com/blogs/aws/feed/"
    category: "云计算"
    enabled: true
    priority: 2

  - name: "Cloudflare Blog"
    type: rss
    url: "https://blog.cloudflare.com/rss/"
    category: "云计算"
    enabled: true
    priority: 2
